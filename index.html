<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>珠海介绍视频</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      padding: 2rem;
      gap: 1.5rem;
    }
    h1 {
      font-size: clamp(1.2rem, 4vw, 2rem);
      font-weight: 700;
      background: linear-gradient(135deg, #00e5ff, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }
    .video-wrap {
      width: 100%;
      max-width: 900px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,229,255,0.15), 0 0 0 1px rgba(255,255,255,0.1);
    }
    video {
      width: 100%;
      display: block;
      background: #000;
    }
    .info {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>🏙️ 珠海 · 粤港澳大湾区C位之城</h1>
  <div class="video-wrap">
    <video controls autoplay playsinline>
      <source src="./video.mp4" type="video/mp4" />
      您的浏览器不支持视频播放，请升级浏览器。
    </video>
  </div>
  <p class="info">珠海介绍视频 · 55秒完整版 · 投资创业视角</p>
</body>
</html>
